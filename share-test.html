<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Share Table as Image</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 2rem; max-width: 640px; }
  #card { background: #fff; padding: 1.25rem; border: 1px solid #ddd; border-radius: 12px; }
  h1 { margin: 0 0 .75rem; font-size: 1.25rem; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #eee; }
  th { background: #f5f7fa; }
  button { margin-top: 1.25rem; padding: .75rem 1.25rem; font-size: 1rem;
           background: #0969da; color: #fff; border: 0; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: .6; cursor: progress; }
  #status { margin-top: .75rem; color: #555; font-size: .9rem; min-height: 1.2em; }
  #preview { margin-top: 1rem; max-width: 100%; border: 1px dashed #ccc; display: none; }
</style>
</head>
<body>
  <div id="card">
    <h1>Quarterly Snapshot</h1>
    <table>
      <thead>
        <tr><th>Metric</th><th>Q1</th><th>Q2</th></tr>
      </thead>
      <tbody>
        <tr><td>Revenue</td><td>$12,400</td><td>$15,900</td></tr>
        <tr><td>New users</td><td>1,204</td><td>1,832</td></tr>
        <tr><td>Churn</td><td>3.1%</td><td>2.4%</td></tr>
        <tr><td>NPS</td><td>42</td><td>51</td></tr>
      </tbody>
    </table>
  </div>

  <button id="shareBtn">Share</button>
  <div id="status"></div>
  <img id="preview" alt="generated preview" />

  <script type="module">
    import { toJpeg } from 'https://esm.sh/html-to-image@1.11.13';

    const btn = document.getElementById('shareBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Rendering image…';
      try {
        const node = document.getElementById('card');
        const dataUrl = await toJpeg(node, { quality: 0.95, pixelRatio: 2, backgroundColor: '#fff' });
        preview.src = dataUrl;
        preview.style.display = 'block';

        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], 'snapshot.jpg', { type: 'image/jpeg' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          status.textContent = 'Opening share sheet…';
          await navigator.share({ files: [file], title: 'Quarterly Snapshot' });
          status.textContent = 'Shared.';
        } else {
          status.textContent = 'Share API unavailable. Long-press the preview image to save it.';
        }
      } catch (err) {
        status.textContent = 'Error: ' + (err?.message || err);
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
